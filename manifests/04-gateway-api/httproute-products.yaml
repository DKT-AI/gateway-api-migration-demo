# HTTPRoute — products routing with traffic splitting
# 90% to v1 (stable), 10% to v2 (canary)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: products
  namespace: gatewaydemo
  labels:
    app.kubernetes.io/part-of: vedmich-gatewaydemo
spec:
  parentRefs:
    - name: gatewaydemo
      namespace: gatewaydemo
  hostnames:
    - gateway-demo.vedmich.dev
  rules:
    # Rule 1: Header-based routing — x-version: v2 goes to products-v2
    - matches:
        - path:
            type: PathPrefix
            value: /api/products
          headers:
            - name: x-version
              value: v2
      backendRefs:
        - name: products-v2
          port: 80

    # Rule 2: Weighted traffic split — 90/10
    - matches:
        - path:
            type: PathPrefix
            value: /api/products
      backendRefs:
        - name: products-v1
          port: 80
          weight: 90
        - name: products-v2
          port: 80
          weight: 10
