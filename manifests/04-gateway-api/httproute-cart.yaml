# HTTPRoute — cart routing (cross-namespace)
# Cart service lives in gatewaydemo-cart namespace
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: cart
  namespace: gatewaydemo
  labels:
    app.kubernetes.io/part-of: vedmich-gatewaydemo
spec:
  parentRefs:
    - name: gatewaydemo
      namespace: gatewaydemo
  hostnames:
    - gateway-demo.vedmich.dev
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/cart
      backendRefs:
        - name: cart
          namespace: gatewaydemo-cart
          port: 80
