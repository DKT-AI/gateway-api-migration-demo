# ALB Ingress — Path 2 starting point
# This is what you have BEFORE migrating to Gateway API (AWS-native)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gatewaydemo
  namespace: gatewaydemo
  labels:
    app.kubernetes.io/part-of: vedmich-gatewaydemo
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/certificate-arn: CERTIFICATE_ARN
    alb.ingress.kubernetes.io/ssl-policy: ELBSecurityPolicy-TLS13-1-2-2021-06
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "15"
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: "5"
    alb.ingress.kubernetes.io/healthy-threshold-count: "2"
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "3"
    # Actions for weighted routing (ALB-native traffic split)
    # alb.ingress.kubernetes.io/actions.products-weighted: |
    #   {"type":"forward","forwardConfig":{"targetGroups":[
    #     {"serviceName":"products-v1","servicePort":"80","weight":90},
    #     {"serviceName":"products-v2","servicePort":"80","weight":10}
    #   ]}}
spec:
  ingressClassName: alb
  rules:
    - host: gateway-demo.vedmich.dev
      http:
        paths:
          - path: /api/products
            pathType: Prefix
            backend:
              service:
                name: products-v1
                port:
                  number: 80
          # NOTE: cart is in gatewaydemo-cart namespace — Ingress cannot
          # cross namespaces. This 503s. Gateway API + ReferenceGrant fixes this.
          - path: /api/cart
            pathType: Prefix
            backend:
              service:
                name: cart
                port:
                  number: 80
