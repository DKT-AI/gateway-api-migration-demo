apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart
  namespace: gatewaydemo-cart
  labels:
    app: cart
    app.kubernetes.io/name: cart
    app.kubernetes.io/part-of: vedmich-gatewaydemo
    app.kubernetes.io/managed-by: kubectl
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cart
  template:
    metadata:
      labels:
        app: cart
        app.kubernetes.io/name: cart
        app.kubernetes.io/part-of: vedmich-gatewaydemo
    spec:
      containers:
        - name: cart
          image: ACCOUNT_ID.dkr.ecr.eu-central-1.amazonaws.com/vedmich-gatewaydemo/cart:latest
          ports:
            - containerPort: 8000
              protocol: TCP
          env:
            - name: SERVICE_NAME
              value: "cart"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: cart
  namespace: gatewaydemo-cart
  labels:
    app: cart
    app.kubernetes.io/name: cart
    app.kubernetes.io/part-of: vedmich-gatewaydemo
spec:
  selector:
    app: cart
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
